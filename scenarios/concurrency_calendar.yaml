scenario_id: concurrency_calendar
description: Conflicting time updates for the same recurring event arrive within a minute. Tests last-writer-wins under same-fact contention.
category: concurrency
events:
  - kind: session
    payload:
      session_id: s_first
      user_id: atlas
      timestamp: 2025-09-22T08:00:00
      turns:
        - role: user
          content: Move my weekly 1:1 with Priya to Wednesdays at 10am Eastern.
        - role: assistant
          content: Updated to Wednesdays 10am.
  - kind: session
    payload:
      session_id: s_second
      user_id: atlas
      timestamp: 2025-09-22T08:00:30
      turns:
        - role: user
          content: Actually scratch that — make the 1:1 Thursdays at 2pm Eastern instead. That's the final time.
        - role: assistant
          content: Updated to Thursdays 2pm.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-09-29T07:00:00
      prompt: What day and time is my next 1:1 with Priya?
      score_method: llm_judge
      category: concurrency
      rubric: |
        Pass requires the response to identify Thursday at 2pm. A response
        mentioning Wednesday or 10am without superseding is a fail. The
        user explicitly stated "that's the final time" in the second session.
