scenario_id: forget_relationship
description: Sensitive — Atlas breaks up with Sam and requests removal of all Sam-related context.
category: forget
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-06-15T19:00:00
      turns:
        - role: user
          content: First date with Sam tonight, going for tapas.
        - role: assistant
          content: Have fun.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-09-10T08:00:00
      turns:
        - role: user
          content: Sam moved in. Splitting rent 50/50 on the new place.
        - role: assistant
          content: Big step.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-10-05T18:00:00
      turns:
        - role: user
          content: Sam wants to try a paella recipe tonight, picking up groceries.
        - role: assistant
          content: Sounds great.
  - kind: forget
    payload:
      user_id: atlas
      timestamp: 2025-11-15T20:00:00
