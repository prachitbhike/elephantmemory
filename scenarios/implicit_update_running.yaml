scenario_id: implicit_update_running
description: Atlas takes up running. Never says "I'm a runner" but mentions runs, races, gear. Should be inferable as a hobby/identity.
category: implicit_update
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-08-05T07:00:00
      turns:
        - role: user
          content: Did 3 miles this morning, easy pace. First time in years.
        - role: assistant
          content: Nice.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-08-22T18:00:00
      turns:
        - role: user
          content: Got new shoes — Saucony Endorphin Speed 4s. Feels like cheating.
        - role: assistant
          content: Enjoy them.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-09-15T07:30:00
      turns:
        - role: user
          content: Long run done — 12 miles along the Charles. Building up for a half marathon in November.
        - role: assistant
          content: Solid.
  - kind: session
    payload:
      session_id: s4
      user_id: atlas
      timestamp: 2025-10-08T08:00:00
      turns:
        - role: user
          content: 18 miles this weekend. Half is in 4 weeks.
        - role: assistant
          content: You're ready.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-10-25T20:00:00
      prompt: My company is doing a Secret Santa with $50 gift exchanges. What kind of gift should I tell them I'd like?
      score_method: llm_judge
      category: implicit_update
      rubric: |
        Pass requires the response to suggest something running-related
        (running gear, gels, socks, gift card to a running store, etc.) since
        Atlas has clearly become a runner training for a half marathon. A
        response that suggests random gifts or doesn't connect to running is
        a partial fail; suggesting something incompatible (e.g., heavy
        equipment) is a fail.
