scenario_id: temporal_supersede_job_title
description: Atlas gets promoted from senior engineer to staff engineer. Probe must reflect new title.
category: temporal_supersede
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-06-01T09:00:00
      turns:
        - role: user
          content: My title is Senior Software Engineer, platform team. Updating my LinkedIn.
        - role: assistant
          content: Done — anything else to update?
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-09-15T17:00:00
      turns:
        - role: user
          content: Just got promoted to Staff Engineer effective Oct 1. New scope is more cross-org.
        - role: assistant
          content: Congrats. I'll keep that updated.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-10-10T10:00:00
      turns:
        - role: user
          content: First Staff-level review meeting yesterday went well.
        - role: assistant
          content: Glad to hear it.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-11-20T14:00:00
      prompt: What's my current job title? I need to put it on a conference bio.
      expected: Staff
      score_method: contains
      category: temporal_supersede
  - kind: probe
    payload:
      probe_id: p2
      user_id: atlas
      timestamp: 2025-11-20T14:01:00
      prompt: Confirm my title for my updated email signature.
      must_not_contain: ["Senior Software Engineer", "Senior Engineer"]
      score_method: must_not_contain
      category: temporal_supersede
