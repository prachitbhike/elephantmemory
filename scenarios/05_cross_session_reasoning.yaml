scenario_id: cross_session_reasoning
description: Answer requires joining a relationship fact (s1) with a preference (s2) and a constraint (s3) across far-apart sessions.
category: cross_session_reasoning
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-07-10T19:00:00
      turns:
        - role: user
          content: My sister Maya is visiting from Seattle next month. She's a vegetarian.
        - role: assistant
          content: Got it.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-08-22T18:00:00
      turns:
        - role: user
          content: I'm really into Sichuan food lately — found a great place in Chinatown called Mala Garden.
        - role: assistant
          content: Nice find.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-09-05T12:00:00
      turns:
        - role: user
          content: I have a peanut allergy — anaphylactic. Always have to ask about it at restaurants.
        - role: assistant
          content: Noted. I'll keep that in mind for restaurant suggestions.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-10-01T10:00:00
      prompt: Pick a restaurant I'd enjoy that also works for my sister when she visits, and note any allergy concerns I should mention when booking.
      score_method: llm_judge
      category: cross_session_reasoning
      rubric: |
        Pass requires the response to:
        1. Recognize the sister (Maya) is vegetarian, OR pick a vegetarian-friendly place,
        2. Reflect Atlas's stated interest in Sichuan food (bonus if it names Mala Garden), AND
        3. Mention the peanut allergy as something to flag.
        Missing the peanut allergy is a hard fail (safety-critical).
        Missing the vegetarian constraint is also a fail.
