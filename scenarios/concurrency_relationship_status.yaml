scenario_id: concurrency_relationship_status
description: Same-day sessions oscillate on relationship status. Memory should reflect the final state, not store both.
category: concurrency
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-11-05T19:00:00
      turns:
        - role: user
          content: Sam and I broke up tonight. Done.
        - role: assistant
          content: Sorry to hear.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-11-05T22:30:00
      turns:
        - role: user
          content: We talked it through, we're back together. Treat us as still a couple.
        - role: assistant
          content: Got it.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-11-15T10:00:00
      prompt: What's my current relationship status with Sam?
      score_method: llm_judge
      category: concurrency
      rubric: |
        Pass requires the response to indicate Atlas and Sam are together /
        in a relationship (the final state). A response that says they
        broke up, or that hedges with "you broke up earlier", is a fail.
        The latest update overrides the earlier one.
