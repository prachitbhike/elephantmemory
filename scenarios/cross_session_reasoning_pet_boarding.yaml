scenario_id: cross_session_reasoning_pet_boarding
description: Booking pet care requires joining the dog's name+breed (s1), a medical condition (s2), and travel dates (s3).
category: cross_session_reasoning
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-06-10T18:00:00
      turns:
        - role: user
          content: My dog Pepper is a golden retriever — 65 lbs, 7 years old.
        - role: assistant
          content: Noted.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-08-22T15:00:00
      turns:
        - role: user
          content: Pepper was diagnosed with mild hip dysplasia — vet says no high-impact play, just leash walks and swimming.
        - role: assistant
          content: Sorry to hear. I'll keep that on file.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-10-05T11:00:00
      turns:
        - role: user
          content: I'm in Tokyo Nov 12-19. Need to figure out Pepper's care for that week.
        - role: assistant
          content: I'll help line that up.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-10-25T09:00:00
      prompt: Draft an email to a dog-boarding place asking about availability and confirming they can handle my dog's needs.
      score_method: llm_judge
      category: cross_session_reasoning
      rubric: |
        Pass requires the email to mention ALL of:
        - the dates (Nov 12-19, or that range),
        - that the dog is a golden retriever (size/breed),
        - the hip dysplasia constraint (no high-impact play / leash walks
          only / swimming OK).
        Missing the medical constraint is a hard fail (welfare-critical).
        Missing the dates is a fail (the entire purpose of the email).
        Missing the breed/size is a partial fail.
