scenario_id: temporal_supersede_seat
description: Atlas initially prefers window seats, then explicitly switches to aisle. Probe must return aisle, not window.
category: temporal_supersede
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-09-01T10:00:00
      turns:
        - role: user
          content: When you book flights for me, default to window seats — I love watching takeoff.
        - role: assistant
          content: Noted. Window seats by default.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-09-12T14:00:00
      turns:
        - role: user
          content: Booked the SFO trip — got a window. Loved it.
        - role: assistant
          content: Great.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-11-04T08:30:00
      turns:
        - role: user
          content: Switching to aisle seats from now on — my back's been killing me on long flights and I need to get up and walk around. Make this the new default.
        - role: assistant
          content: Updated — aisle seats by default going forward.
  - kind: session
    payload:
      session_id: s4
      user_id: atlas
      timestamp: 2025-11-20T11:00:00
      turns:
        - role: user
          content: Aisle seat on the JFK flight worked great, thanks for booking it that way.
        - role: assistant
          content: Glad to hear it.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-12-15T09:00:00
      prompt: I'm flying to Chicago next week. What seat should I book?
      expected: aisle
      score_method: llm_judge
      category: temporal_supersede
      rubric: |
        Pass only if the response recommends an aisle seat. The user previously
        preferred window seats but explicitly switched to aisle. A response
        that mentions the old window preference at all without clearly
        superseding it should fail. A response that recommends window fails.
  - kind: probe
    payload:
      probe_id: p2
      user_id: atlas
      timestamp: 2025-12-15T09:01:00
      prompt: Just to confirm — what's my current default seat preference?
      expected: aisle
      score_method: contains
      category: temporal_supersede
