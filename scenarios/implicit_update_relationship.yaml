scenario_id: implicit_update_relationship
description: Atlas mentions "Sam" across many sessions in increasingly intimate contexts. Never explicitly says "my partner" but should be inferable.
category: implicit_update
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-06-15T19:00:00
      turns:
        - role: user
          content: First date with Sam tonight. Going for tapas.
        - role: assistant
          content: Have fun.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-07-20T20:00:00
      turns:
        - role: user
          content: Sam and I are doing a weekend trip to the Cape next month.
        - role: assistant
          content: Nice.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-09-10T08:00:00
      turns:
        - role: user
          content: Sam moved in last weekend. Splitting the rent on the new place 50/50.
        - role: assistant
          content: Big step.
  - kind: session
    payload:
      session_id: s4
      user_id: atlas
      timestamp: 2025-10-05T18:00:00
      turns:
        - role: user
          content: Picking up groceries on the way home — Sam wants to try a paella recipe tonight.
        - role: assistant
          content: Sounds great.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-10-20T11:00:00
      prompt: I'm filling out a form that asks about my household. Who do I live with?
      score_method: llm_judge
      category: implicit_update
      rubric: |
        Pass requires the response to identify Sam as Atlas's partner /
        significant other / live-in (or at minimum, the person he lives with).
        Atlas explicitly stated Sam moved in. A response that doesn't mention
        Sam, or lists family members, is a fail.
