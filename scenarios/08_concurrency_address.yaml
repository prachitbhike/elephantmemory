scenario_id: concurrency_address
description: Two sessions in the same minute update Atlas's address — one says new, one says old (correction). Memory layer must converge to the most recent fact.
category: concurrency
events:
  - kind: session
    payload:
      session_id: s_old
      user_id: atlas
      timestamp: 2025-10-10T14:00:00
      turns:
        - role: user
          content: My address is 412 Marlborough St, Boston MA 02115.
        - role: assistant
          content: Saved.
  - kind: session
    payload:
      session_id: s_new
      user_id: atlas
      timestamp: 2025-10-10T14:00:30
      turns:
        - role: user
          content: Just moved — actually update my address to 88 Kingston St, Boston MA 02111. The Marlborough place was the old one.
        - role: assistant
          content: Updated.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-10-15T09:00:00
      prompt: Confirm my current shipping address.
      expected: 88 Kingston St
      score_method: contains
      category: concurrency
  - kind: probe
    payload:
      probe_id: p2
      user_id: atlas
      timestamp: 2025-10-15T09:01:00
      prompt: Where do I currently live? Just street + city.
      must_not_contain: ["Marlborough"]
      score_method: must_not_contain
      category: concurrency
