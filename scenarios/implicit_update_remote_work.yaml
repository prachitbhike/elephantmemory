scenario_id: implicit_update_remote_work
description: Atlas never says "I work remotely" but every session reveals he's at home or traveling, never at an office. Should be inferable.
category: implicit_update
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-09-08T09:00:00
      turns:
        - role: user
          content: Standup just wrapped — I dialed in from my kitchen as usual.
        - role: assistant
          content: Productive day ahead?
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-09-12T11:00:00
      turns:
        - role: user
          content: Took the laptop to the back porch for the afternoon. Nicer than the kitchen.
        - role: assistant
          content: Sounds good.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-09-19T14:00:00
      turns:
        - role: user
          content: Working from a co-working space in Lisbon this week, two-week trip.
        - role: assistant
          content: Enjoy the time abroad.
  - kind: session
    payload:
      session_id: s4
      user_id: atlas
      timestamp: 2025-10-02T10:00:00
      turns:
        - role: user
          content: Back home. Setting the standing desk back up after the trip.
        - role: assistant
          content: Welcome back.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-10-15T13:00:00
      prompt: HR is asking everyone to confirm their work arrangement for the records — am I primarily in-office, hybrid, or remote?
      score_method: llm_judge
      category: implicit_update
      rubric: |
        Pass requires the response to identify Atlas as remote (or fully
        remote / work-from-home / not in-office). Across 4 sessions he has
        worked from his kitchen, back porch, a co-working space abroad, and
        a standing desk at home — never an office. A response that says
        in-office or hybrid is a fail. A response that hedges with "I don't
        know" is a partial fail.
