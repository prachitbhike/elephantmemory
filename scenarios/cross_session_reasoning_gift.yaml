scenario_id: cross_session_reasoning_gift
description: Picking a gift for sister Maya requires joining her dietary restriction (s1), her hobby (s2), her city (s3), and a budget constraint (s4).
category: cross_session_reasoning
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-07-10T19:00:00
      turns:
        - role: user
          content: My sister Maya is gluten-free. Always have to be careful with shared meals.
        - role: assistant
          content: Noted.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-08-03T11:00:00
      turns:
        - role: user
          content: Maya got really into pottery this year — she takes classes at a studio near her place.
        - role: assistant
          content: Cool hobby.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-08-15T14:00:00
      turns:
        - role: user
          content: Maya lives in Seattle, Capitol Hill neighborhood specifically.
        - role: assistant
          content: Got it.
  - kind: session
    payload:
      session_id: s4
      user_id: atlas
      timestamp: 2025-10-20T09:00:00
      turns:
        - role: user
          content: Holiday budget for family gifts this year is tight — keeping each one under $75.
        - role: assistant
          content: Sensible.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-11-25T10:00:00
      prompt: What should I get my sister Maya for the holidays this year?
      score_method: llm_judge
      category: cross_session_reasoning
      rubric: |
        Pass requires the suggestion to ALL of:
        - fit the $75 budget (or smaller),
        - relate to pottery (her hobby) OR be gluten-free food/drink-related,
        - and not contradict her gluten-free constraint.
        Suggesting a gluten-containing food gift is a hard fail. Suggesting
        something pottery-related, a Seattle-local experience, or a
        gluten-free treat all pass if budget is reasonable. Recommendations
        over $75 fail. Generic responses ("a sweater") fail.
