scenario_id: recall_employer
description: Atlas mentions employer name and team in two early sessions. Probed across many session boundaries.
category: recall
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-07-01T09:00:00
      turns:
        - role: user
          content: Just finished my first month at Helix on the platform team. Onboarding's been intense but good.
        - role: assistant
          content: Glad it's going well. What are you focused on?
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-07-15T16:00:00
      turns:
        - role: user
          content: Helix all-hands tomorrow at 10. CEO is presenting Q2 numbers.
        - role: assistant
          content: Noted.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-08-22T19:00:00
      turns:
        - role: user
          content: Long day. Going to make pasta and watch a movie.
        - role: assistant
          content: Good plan.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-09-30T14:00:00
      prompt: Where do I work, and on what team?
      score_method: llm_judge
      category: recall
      rubric: |
        Pass requires the response to mention BOTH "Helix" (or a clear
        reference to it) AND "platform" (the team). Missing either is a fail.
