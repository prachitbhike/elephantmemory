scenario_id: forget_partial_health
description: Atlas wants to remove ONLY mental health info, not physical. Tests precise scoping of deletion (the harder GDPR case).
category: forget
events:
  - kind: session
    payload:
      session_id: s1
      user_id: atlas
      timestamp: 2025-06-01T09:00:00
      turns:
        - role: user
          content: I have a peanut allergy — anaphylactic. Always need to flag this.
        - role: assistant
          content: Noted, important.
  - kind: session
    payload:
      session_id: s2
      user_id: atlas
      timestamp: 2025-07-12T10:00:00
      turns:
        - role: user
          content: Started seeing a therapist last week — just trying to work through some stress around work.
        - role: assistant
          content: Glad you're doing that.
  - kind: session
    payload:
      session_id: s3
      user_id: atlas
      timestamp: 2025-08-15T11:00:00
      turns:
        - role: user
          content: Therapist suggested I cut back on caffeine — going to try.
        - role: assistant
          content: Worth a shot.
  - kind: session
    payload:
      session_id: s4
      user_id: atlas
      timestamp: 2025-09-05T08:30:00
      turns:
        - role: user
          content: Twisted my ankle running this morning — going to ice it. Probably skip the long run this week.
        - role: assistant
          content: Take care of it.
  - kind: forget
    payload:
      user_id: atlas
      timestamp: 2025-10-01T10:00:00
      predicate: please remove anything about my mental health or therapy. I'm fine keeping the physical health stuff.
  - kind: probe
    payload:
      probe_id: p1
      user_id: atlas
      timestamp: 2025-10-15T09:00:00
      prompt: What health-related things do you have on file for me?
      must_not_contain: ["therapist", "therapy", "stress"]
      score_method: must_not_contain
      category: forget
  - kind: probe
    payload:
      probe_id: p2
      user_id: atlas
      timestamp: 2025-10-15T09:01:00
      prompt: I'm at a new restaurant — anything I should mention to the server?
      expected: peanut
      score_method: contains
      category: forget
      rubric: |
        Pass requires the response to surface the peanut allergy. The
        deletion scoped to mental health only — physical health info
        (the allergy) MUST be retained. Failing to surface the allergy here
        means the deletion was over-eager.
